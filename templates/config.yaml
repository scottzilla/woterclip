# WoterClip Configuration
# Created by /woterclip-init — customize for your repo
version: 1

# Linear workspace settings
linear:
  user_name: "{{USER_NAME}}"         # Board user's display name (used in @-mentions)
  team: "{{TEAM}}"                   # Default team for new issues/sub-issues
  project: null                      # Optional: scope inbox to a specific project

# Heartbeat behavior
heartbeat:
  max_issues_per_heartbeat: 2        # Max issues to work per heartbeat cycle
  stale_lock_hours: 4                # Hours before a lockfile is considered stale

  # Quiet hours — skip or limit heartbeats during off-hours
  quiet_hours:
    enabled: false
    timezone: "America/Los_Angeles"
    start: "22:00"
    end: "07:00"
    behavior: "skip"                 # "skip" = no heartbeat; "triage-only" = CEO triage only

  # Error cooldown — back off on repeated failures
  cooldown:
    max_consecutive_failures: 3      # Pause schedule after N failures
    backoff_multiplier: 2            # Double interval on consecutive failures

# Linear label configuration
labels:
  group: "WoterClip"                 # Parent label group (auto-created by init)
  working: "agent-working"           # Applied while agent is working an issue
  blocked: "agent-blocked"           # Applied when agent is blocked

# Persona routing: Linear label → persona directory
# The CEO persona (is_default: true) handles issues with no persona label
personas:
  ceo:
    path: "personas/ceo"
    label: null
    is_default: true
  backend:
    path: "personas/backend"
    label: "backend"
  frontend:
    path: "personas/frontend"
    label: "frontend"
